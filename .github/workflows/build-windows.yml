name: Windows Build (MSVC)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

env:
  MYSQL_VERSION: "8.4.4"

jobs:
  build:
    name: Windows 2022 — MSVC 2022 — RelWithDebInfo
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------------------
      # OpenSSL — pre-installed on windows-2022 runner
      # -------------------------------------------------------------------
      - name: Locate OpenSSL
        id: openssl
        run: |
          $path = "C:\Program Files\OpenSSL-Win64"
          if (Test-Path $path) {
            echo "OPENSSL_ROOT_DIR=$path" >> $env:GITHUB_ENV
            Write-Host "OpenSSL found at $path"
          } else {
            choco install openssl --no-progress -y
            echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV
          }

      # -------------------------------------------------------------------
      # Boost — use the version pre-installed on the GitHub runner.
      # windows-2022 ships Boost 1.86+ at a versioned env var such as
      # BOOST_ROOT_1_86_0. We walk the known variables newest-first and
      # export the first one we find as BOOST_ROOT.
      # -------------------------------------------------------------------
      - name: Locate pre-installed Boost
        run: |
          $candidates = @(
            $env:BOOST_ROOT_1_87_0,
            $env:BOOST_ROOT_1_86_0,
            $env:BOOST_ROOT_1_85_0,
            $env:BOOST_ROOT_1_84_0,
            $env:BOOST_ROOT_1_83_0,
            $env:BOOST_ROOT
          )
          $found = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $found) { Write-Error "No pre-installed Boost found on runner"; exit 1 }
          Write-Host "Using Boost at $found"
          echo "BOOST_ROOT=$found" >> $env:GITHUB_ENV

      # -------------------------------------------------------------------
      # MySQL 8.4 connector — download the server ZIP which contains the
      # client headers and libmysql.dll needed to build against.
      # -------------------------------------------------------------------
      - name: Cache MySQL ${{ env.MYSQL_VERSION }} connector
        id: cache-mysql
        uses: actions/cache@v4
        with:
          path: C:\mysql
          key: mysql-${{ env.MYSQL_VERSION }}-winx64

      - name: Download MySQL ${{ env.MYSQL_VERSION }}
        if: steps.cache-mysql.outputs.cache-hit != 'true'
        run: |
          $url = "https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-${{ env.MYSQL_VERSION }}-winx64.zip"
          Write-Host "Downloading MySQL from $url"
          Invoke-WebRequest -Uri $url -OutFile mysql.zip -TimeoutSec 300
          Expand-Archive mysql.zip -DestinationPath C:\mysql-tmp
          Move-Item "C:\mysql-tmp\mysql-${{ env.MYSQL_VERSION }}-winx64" "C:\mysql"

      # -------------------------------------------------------------------
      # Configure
      # -------------------------------------------------------------------
      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DSCRIPTS=static
          -DTOOLS=ON
          -DSERVERS=ON
          -DWITH_WARNINGS=ON
          -DMYSQL_ROOT_DIR="C:\mysql"
        env:
          BOOST_ROOT: ${{ env.BOOST_ROOT }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}

      # -------------------------------------------------------------------
      # Build
      # -------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel 2

      # -------------------------------------------------------------------
      # Package — collect binaries, configs, and required runtime DLLs
      # -------------------------------------------------------------------
      - name: Package artifacts
        run: |
          $out = "dist"
          New-Item -ItemType Directory -Force $out | Out-Null

          # Binaries
          Copy-Item "build\bin\RelWithDebInfo\*.exe" $out
          Copy-Item "build\bin\RelWithDebInfo\*.dll" $out -ErrorAction SilentlyContinue

          # Configs
          if (Test-Path "build\bin\RelWithDebInfo\configs") {
            Copy-Item "build\bin\RelWithDebInfo\configs" "$out\configs" -Recurse
          }

          # MySQL runtime
          Copy-Item "C:\mysql\lib\libmysql.dll" $out

          # OpenSSL runtime
          $ssl = $env:OPENSSL_ROOT_DIR
          Get-ChildItem "$ssl\bin\*.dll" | Copy-Item -Destination $out

          # Zip — one with symbols, one without
          Compress-Archive "$out\*" "ArgusCore-Win64-${{ github.sha }}.zip"
          Get-ChildItem $out -Filter *.pdb -Recurse | Remove-Item -Force
          Compress-Archive "$out\*" "ArgusCore-Win64-${{ github.sha }}-NoSymbols.zip"

      - name: Upload artifact (with symbols)
        uses: actions/upload-artifact@v4
        with:
          name: ArgusCore-Win64-${{ github.sha }}
          path: ArgusCore-Win64-${{ github.sha }}.zip
          retention-days: 30

      - name: Upload artifact (no symbols)
        uses: actions/upload-artifact@v4
        with:
          name: ArgusCore-Win64-${{ github.sha }}-NoSymbols
          path: ArgusCore-Win64-${{ github.sha }}-NoSymbols.zip
          retention-days: 30
