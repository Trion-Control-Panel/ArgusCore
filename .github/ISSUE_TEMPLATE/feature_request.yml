name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests small and focused. See ROADMAP.md for current priorities.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be added or improved?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Suggested implementation
      description: Optional — if you have an idea of how this could be done
